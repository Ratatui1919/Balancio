<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>· BORGY ·</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome для іконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анімований фон */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 20px,
                transparent 20px,
                transparent 40px
            );
            animation: moveBg 60s linear infinite;
            pointer-events: none;
        }

        @keyframes moveBg {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(-30%, -30%) rotate(10deg); }
        }

        .container {
            width: 100%;
            max-width: 1400px;
            position: relative;
            z-index: 10;
        }

        /* Стильна картка */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            padding: 40px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.8);
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(10deg);
            transition: transform 0.3s ease;
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
            transform: rotate(-10deg);
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logo-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 15px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Кнопки */
        .btn {
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-google {
            background: white;
            color: #333;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-google i {
            font-size: 20px;
            color: #4285F4;
        }

        .user-email {
            background: linear-gradient(135deg, #f5f7fa, #e9ecf2);
            padding: 12px 25px;
            border-radius: 60px;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .user-email i {
            color: #667eea;
        }

        .btn-logout {
            background: #fff;
            color: #ff4757;
            border: 2px solid #ff4757;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2);
        }

        .btn-logout:hover {
            background: #ff4757;
            color: white;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff, #f5f7fa);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .stat-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-title i {
            color: #667eea;
        }

        .stat-total {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            color: #444;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        /* Цілі */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-create {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.3);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 176, 155, 0.4);
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .goal-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .goal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
        }

        .goal-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: #fff1f0;
            color: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #ff4757;
            transition: all 0.3s ease;
        }

        .goal-delete:hover {
            background: #ff4757;
            color: white;
            transform: rotate(90deg);
        }

        .goal-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            padding-right: 40px;
        }

        .goal-currency {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .goal-target {
            font-size: 2rem;
            font-weight: 700;
            color: #00b09b;
            margin: 15px 0;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9rem;
            margin: 15px 0 8px;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .goal-actions {
            display: flex;
            gap: 10px;
        }

        .input-group {
            flex: 2;
            display: flex;
            background: #f5f7fa;
            border-radius: 60px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            font-size: 0.9rem;
        }

        .input-group button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            width: 45px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-group button:hover {
            opacity: 0.8;
        }

        .btn-withdraw {
            flex: 1;
            background: #fff1f0;
            border: 1px solid #ff4757;
            color: #ff4757;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-withdraw:hover {
            background: #ff4757;
            color: white;
        }

        /* Борги */
        .debts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .debt-column {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .debt-column h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .debt-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .debt-item {
            background: #f5f7fa;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .debt-item:hover {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            transform: translateX(5px);
        }

        .debt-name {
            font-weight: 600;
            color: #333;
        }

        .debt-amount {
            font-weight: 700;
            padding: 5px 15px;
            background: white;
            border-radius: 30px;
            color: #667eea;
        }

        .debt-amount.owe {
            color: #ff4757;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, select {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            border-radius: 60px;
            font-size: 0.95rem;
            flex: 1;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-clear {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 12px 25px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background: #ff4757;
            color: white;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-input, .modal-select {
            width: 100%;
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 60px;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.create {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn.cancel {
            background: #f5f7fa;
            color: #333;
        }

        /* Адаптивність */
        @media (max-width: 768px) {
            .glass-card {
                padding: 25px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .logo {
                justify-content: center;
            }

            .auth-section {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .debts-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                flex-direction: column;
            }

            .goal-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 1.8rem;
            }

            .logo-badge {
                display: none;
            }

            .stat-total {
                font-size: 2rem;
            }
        }

        /* Анімації */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card, .goal-card, .debt-column {
            animation: fadeIn 0.6s ease-out;
        }

        /* Стильний скрол */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-coins"></i>
                    </div>
                    <span class="logo-text">BORGY</span>
                    <span class="logo-badge">🔥 premium</span>
                </div>
                <div class="auth-section" id="authSection">
                    <div id="userInfo" style="display: none;">
                        <span class="user-email">
                            <i class="fas fa-user-circle"></i>
                            <span id="userEmail"></span>
                        </span>
                        <button class="btn btn-logout" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i> ВИЙТИ
                        </button>
                    </div>
                    <button class="btn btn-google" id="loginBtn">
                        <i class="fab fa-google"></i>
                        УВІЙТИ ЧЕРЕЗ GOOGLE
                    </button>
                </div>
            </div>

            <!-- Контент -->
            <div id="mainContent" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-arrow-down"></i> МЕНІ ВИНЕНІ
                        </div>
                        <div class="stat-total" id="totalOwed">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="owedUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="owedEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="owedUSD">0 $</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-arrow-up"></i> Я ВИНЕН
                        </div>
                        <div class="stat-total" id="totalOwe">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="oweUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="oweEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="oweUSD">0 $</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-balance-scale"></i> ЧИСТИЙ РЕЗУЛЬТАТ
                        </div>
                        <div class="stat-total" id="totalNet">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="netUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="netEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="netUSD">0 $</span></div>
                    </div>
                </div>

                <div class="goals-section">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-trophy" style="color: #ffd700;"></i>
                            МОЇ ЦІЛІ
                        </h2>
                        <button class="btn btn-create" id="createGoalBtn">
                            <i class="fas fa-plus"></i> НОВА ЦІЛЬ
                        </button>
                    </div>
                    <div class="goals-grid" id="goalsContainer"></div>
                </div>

                <div class="debts-grid">
                    <div class="debt-column">
                        <h3>
                            <i class="fas fa-inbox" style="color: #667eea;"></i>
                            МЕНІ ВИНЕНІ
                        </h3>
                        <ul class="debt-list" id="owedList"></ul>
                        <div class="form-row">
                            <input type="text" id="owedName" placeholder="Ім'я">
                            <input type="number" id="owedAmount" placeholder="Сума" step="0.01">
                        </div>
                        <div class="form-row">
                            <select id="owedCurrency">
                                <option value="UAH">🇺🇦 UAH</option>
                                <option value="EUR">🇪🇺 EUR</option>
                                <option value="USD">🇺🇸 USD</option>
                            </select>
                            <input type="text" id="owedDesc" placeholder="Опис">
                        </div>
                        <button class="btn-add" id="addOwedBtn">
                            <i class="fas fa-plus-circle"></i> ДОДАТИ
                        </button>
                    </div>
                    <div class="debt-column">
                        <h3>
                            <i class="fas fa-paper-plane" style="color: #ff4757;"></i>
                            Я ВИНЕН
                        </h3>
                        <ul class="debt-list" id="oweList"></ul>
                        <div class="form-row">
                            <input type="text" id="oweName" placeholder="Кому">
                            <input type="number" id="oweAmount" placeholder="Сума" step="0.01">
                        </div>
                        <div class="form-row">
                            <select id="oweCurrency">
                                <option value="UAH">🇺🇦 UAH</option>
                                <option value="EUR">🇪🇺 EUR</option>
                                <option value="USD">🇺🇸 USD</option>
                            </select>
                            <input type="text" id="oweDesc" placeholder="Опис">
                        </div>
                        <button class="btn-add" id="addOweBtn">
                            <i class="fas fa-plus-circle"></i> ДОДАТИ
                        </button>
                    </div>
                </div>
            </div>

            <!-- Футер -->
            <div class="footer" id="footer" style="display: none;">
                <span>
                    <i class="fas fa-shield-alt"></i> Дані синхронізуються через Firebase
                </span>
                <button class="btn-clear" id="clearAllBtn">
                    <i class="fas fa-trash"></i> ОЧИСТИТИ ВСЕ
                </button>
            </div>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <h2>🎯 СТВОРИТИ ЦІЛЬ</h2>
            <input type="text" class="modal-input" id="goalName" placeholder="Назва (наприклад, ТЕЛЕФОН)">
            <select class="modal-select" id="goalCurrency">
                <option value="UAH">🇺🇦 ГРИВНЯ (UAH)</option>
                <option value="EUR">🇪🇺 ЄВРО (EUR)</option>
                <option value="USD">🇺🇸 ДОЛАР (USD)</option>
            </select>
            <input type="number" class="modal-input" id="goalTarget" placeholder="Цільова сума" min="1" step="1">
            <div class="modal-buttons">
                <button class="modal-btn create" id="saveGoalBtn">
                    <i class="fas fa-check"></i> СТВОРИТИ
                </button>
                <button class="modal-btn cancel" id="cancelGoalBtn">
                    <i class="fas fa-times"></i> СКАСУВАТИ
                </button>
            </div>
        </div>
    </div>

    <script>
        // ТВІЙ КОНФІГ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD6hldl2mZS1xZe1Z8ZERWM19kpCjAqfwQ",
            authDomain: "borgi-60d8d.firebaseapp.com",
            databaseURL: "https://borgi-60d8d-default-rtdb.firebaseio.com",
            projectId: "borgi-60d8d",
            storageBucket: "borgi-60d8d.firebasestorage.app",
            messagingSenderId: "361694792367",
            appId: "1:361694792367:web:ccbfc861668a568e1e225a",
            measurementId: "G-24DJQ1KSG8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let state = { goals: [], debts: { owed: [], owe: [] } };
        let currentUser = null;

        // Елементи DOM
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userEmail = document.getElementById('userEmail');
        const mainContent = document.getElementById('mainContent');
        const footer = document.getElementById('footer');

        function getSymbol(currency) {
            if (currency === 'UAH') return '₴';
            if (currency === 'EUR') return '€';
            if (currency === 'USD') return '$';
            return '?';
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 9); }

        function updateStats() {
            let owedUAH=0, owedEUR=0, owedUSD=0, oweUAH=0, oweEUR=0, oweUSD=0;
            
            (state.debts.owed || []).forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') owedUAH+=a; else if(i.currency==='EUR') owedEUR+=a; else if(i.currency==='USD') owedUSD+=a; });
            (state.debts.owe || []).forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') oweUAH+=a; else if(i.currency==='EUR') oweEUR+=a; else if(i.currency==='USD') oweUSD+=a; });

            document.getElementById('owedUAH').innerHTML = owedUAH.toFixed(2)+' ₴';
            document.getElementById('owedEUR').innerHTML = owedEUR.toFixed(2)+' €';
            document.getElementById('owedUSD').innerHTML = owedUSD.toFixed(2)+' $';
            document.getElementById('totalOwed').innerHTML = (owedUAH+owedEUR+owedUSD).toFixed(2)+' ₴';

            document.getElementById('oweUAH').innerHTML = oweUAH.toFixed(2)+' ₴';
            document.getElementById('oweEUR').innerHTML = oweEUR.toFixed(2)+' €';
            document.getElementById('oweUSD').innerHTML = oweUSD.toFixed(2)+' $';
            document.getElementById('totalOwe').innerHTML = (oweUAH+oweEUR+oweUSD).toFixed(2)+' ₴';

            const nUAH=owedUAH-oweUAH, nEUR=owedEUR-oweEUR, nUSD=owedUSD-oweUSD;
            const total=(owedUAH+owedEUR+owedUSD)-(oweUAH+oweEUR+oweUSD);

            document.getElementById('netUAH').innerHTML = (nUAH>=0?'+':'')+nUAH.toFixed(2)+' ₴';
            document.getElementById('netEUR').innerHTML = (nEUR>=0?'+':'')+nEUR.toFixed(2)+' €';
            document.getElementById('netUSD').innerHTML = (nUSD>=0?'+':'')+nUSD.toFixed(2)+' $';
            document.getElementById('totalNet').innerHTML = (total>=0?'+':'')+total.toFixed(2)+' ₴';
        }

        function renderGoals() {
            const container = document.getElementById('goalsContainer');
            if (!state.goals?.length) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;background:#f5f7fa;border-radius:24px;color:#666;">➕ Створіть свою першу ціль</div>';
                return;
            }
            let html = '';
            state.goals.forEach(g => {
                const s = getSymbol(g.currency), p = g.target>0 ? (g.saved/g.target)*100 : 0, r = Math.max(0, g.target-g.saved);
                html += `<div class="goal-card"><div class="goal-delete" onclick="deleteGoal('${g.id}')"><i class="fas fa-times"></i></div><div class="goal-name">${esc(g.name)}</div><div class="goal-currency">${g.currency}</div><div class="goal-target">${g.target.toFixed(0)} ${s}</div><div class="progress-stats"><span><i class="fas fa-piggy-bank"></i> ${g.saved.toFixed(2)} ${s}</span><span><i class="fas fa-clock"></i> ${r.toFixed(2)} ${s}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(p,100)}%"></div></div><div class="goal-actions"><div class="input-group"><input type="number" id="add-${g.id}" placeholder="Сума"><button onclick="addToGoal('${g.id}')"><i class="fas fa-plus"></i></button></div><button class="btn-withdraw" onclick="withdrawFromGoal('${g.id}')"><i class="fas fa-hand-holding-usd"></i> ЗНЯТИ</button></div></div>`;
            });
            container.innerHTML = html;
        }

        function renderDebts() {
            const owedList = document.getElementById('owedList');
            owedList.innerHTML = (!state.debts.owed?.length) ? '<li style="text-align:center;padding:20px;">Поки ніхто не винен</li>' : 
                state.debts.owed.map(i => `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount">${Number(i.amount).toFixed(2)} ${getSymbol(i.currency)}</div></li>`).join('');

            document.querySelectorAll('#owedList .debt-item').forEach(el => el.addEventListener('click', function() {
                if(confirm('Видалити?')) { state.debts.owed = state.debts.owed.filter(d => d.id !== this.dataset.id); saveToFirebase(); }}));

            const oweList = document.getElementById('oweList');
            oweList.innerHTML = (!state.debts.owe?.length) ? '<li style="text-align:center;padding:20px;">Поки нікому не винен</li>' : 
                state.debts.owe.map(i => `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount owe">${Number(i.amount).toFixed(2)} ${getSymbol(i.currency)}</div></li>`).join('');

            document.querySelectorAll('#oweList .debt-item').forEach(el => el.addEventListener('click', function() {
                if(confirm('Видалити?')) { state.debts.owe = state.debts.owe.filter(d => d.id !== this.dataset.id); saveToFirebase(); }}));
        }

        function saveToFirebase() {
            if (!currentUser) return;
            database.ref('users/' + currentUser.uid).set({
                goals: state.goals || [],
                debts: { owed: state.debts.owed || [], owe: state.debts.owe || [] }
            });
        }

        function loadFromFirebase(uid) {
            database.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    state.goals = data.goals || [];
                    state.debts = { owed: data.debts?.owed || [], owe: data.debts?.owe || [] };
                }
                renderGoals(); renderDebts(); updateStats();
            });
        }

        window.addToGoal = function(id) {
            let i = document.getElementById('add-'+id), a = parseFloat(i.value);
            if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g) { g.saved += a; saveToFirebase(); } }
            i.value = '';
        };

        window.withdrawFromGoal = function(id) {
            let a = parseFloat(prompt('Скільки зняти?','0'));
            if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g && a<=g.saved) { g.saved -= a; saveToFirebase(); } else alert('Недостатньо'); }
        };

        window.deleteGoal = function(id) {
            if (confirm('Видалити ціль?')) { state.goals = state.goals.filter(g=>g.id!==id); saveToFirebase(); }
        };

        document.getElementById('addOwedBtn').addEventListener('click', () => {
            let n=document.getElementById('owedName').value.trim(), a=parseFloat(document.getElementById('owedAmount').value), c=document.getElementById('owedCurrency').value, d=document.getElementById('owedDesc').value.trim();
            if(!n||isNaN(a)||a<=0) { alert('Заповніть поля'); return; }
            if(!state.debts.owed) state.debts.owed = [];
            state.debts.owed.push({id:genId(), name:n, amount:a, currency:c, description:d});
            saveToFirebase();
            document.getElementById('owedName').value = document.getElementById('owedAmount').value = document.getElementById('owedDesc').value = '';
        });

        document.getElementById('addOweBtn').addEventListener('click', () => {
            let n=document.getElementById('oweName').value.trim(), a=parseFloat(document.getElementById('oweAmount').value), c=document.getElementById('oweCurrency').value, d=document.getElementById('oweDesc').value.trim();
            if(!n||isNaN(a)||a<=0) { alert('Заповніть поля'); return; }
            if(!state.debts.owe) state.debts.owe = [];
            state.debts.owe.push({id:genId(), name:n, amount:a, currency:c, description:d});
            saveToFirebase();
            document.getElementById('oweName').value = document.getElementById('oweAmount').value = document.getElementById('oweDesc').value = '';
        });

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('Видалити ВСІ дані?')) {
                state = { goals: [], debts: { owed: [], owe: [] } };
                saveToFirebase();
            }
        });

        // Модалка
        const modal = document.getElementById('goalModal');
        document.getElementById('createGoalBtn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('cancelGoalBtn').addEventListener('click', () => {
            modal.classList.remove('active');
            document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
        });
        document.getElementById('saveGoalBtn').addEventListener('click', () => {
            let n = document.getElementById('goalName').value.trim().toUpperCase();
            let c = document.getElementById('goalCurrency').value;
            let t = parseFloat(document.getElementById('goalTarget').value);
            if (!n || isNaN(t) || t<=0) { alert('Введіть назву та суму'); return; }
            if(!state.goals) state.goals = [];
            state.goals.push({id:genId(), name:n, currency:c, target:t, saved:0});
            saveToFirebase();
            document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
            modal.classList.remove('active');
        });
        modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('active'); });

        // Аутентифікація
        loginBtn.addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message)));
        logoutBtn.addEventListener('click', () => auth.signOut());

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                userEmail.textContent = user.email;
                userInfo.style.display = 'flex';
                loginBtn.style.display = 'none';
                mainContent.style.display = 'block';
                footer.style.display = 'flex';
                loadFromFirebase(user.uid);
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                loginBtn.style.display = 'flex';
                mainContent.style.display = 'none';
                footer.style.display = 'none';
                state = { goals: [], debts: { owed: [], owe: [] } };
            }
        });
    </script>
</body>
</html>
