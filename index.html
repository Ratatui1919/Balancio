<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BORGY · фінансовий хаб</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0d12 0%, #14181f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        /* Кольорові акценти на фоні */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(147, 112, 219, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 70%, rgba(100, 149, 237, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, rgba(60, 179, 113, 0.05) 0%, transparent 40%);
            pointer-events: none;
            top: 0;
            left: 0;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            position: relative;
            z-index: 10;
        }

        /* Індикатор оновлення */
        .refresh-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 0;
            background: linear-gradient(180deg, #2a2f3f, #1a1e2a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8c7ff;
            font-size: 0.9rem;
            gap: 10px;
            transition: height 0.2s;
            overflow: hidden;
            z-index: 1000;
            border-bottom: 1px solid rgba(147, 112, 219, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .refresh-indicator.active {
            height: 50px;
        }

        .refresh-indicator i {
            animation: spin 0.8s linear infinite;
            color: #9370db;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Головна картка */
        .glass-card {
            background: rgba(18, 22, 30, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 36px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(147, 112, 219, 0.15);
            padding: 32px;
            transition: all 0.3s ease;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #2a2f3f, #1f2430);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(147, 112, 219, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .logo-icon i {
            font-size: 24px;
            color: #9370db;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e0e5ff, #b8c7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-badge {
            background: rgba(147, 112, 219, 0.1);
            color: #b8a2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 8px;
            border: 1px solid rgba(147, 112, 219, 0.2);
            backdrop-filter: blur(5px);
        }

        .logo-badge i {
            margin-right: 6px;
            color: #9370db;
        }

        /* Кнопки */
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 35, 48, 0.9);
            color: #e0e5ff;
            border: 1px solid rgba(147, 112, 219, 0.2);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(45, 50, 70, 0.95);
            border-color: rgba(147, 112, 219, 0.4);
            transform: translateY(-1px);
        }

        .btn-google {
            background: rgba(45, 50, 70, 0.95);
            color: #e0e5ff;
        }

        .btn-google i {
            color: #9370db;
        }

        .user-email {
            background: rgba(30, 35, 48, 0.9);
            padding: 12px 22px;
            border-radius: 40px;
            color: #d0dcff;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(147, 112, 219, 0.2);
        }

        .user-email i {
            color: #9370db;
        }

        .btn-logout {
            background: rgba(50, 35, 45, 0.9);
            color: #ffb8d0;
            border-color: rgba(219, 112, 147, 0.3);
        }

        .btn-logout:hover {
            background: rgba(70, 45, 60, 0.95);
            border-color: rgba(219, 112, 147, 0.5);
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(22, 26, 36, 0.7);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(147, 112, 219, 0.15);
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            background: rgba(28, 32, 45, 0.8);
            border-color: rgba(147, 112, 219, 0.3);
            box-shadow: 0 10px 20px rgba(147, 112, 219, 0.1);
        }

        .stat-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8c9cc0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-title i {
            color: #9370db;
        }

        .stat-total {
            font-size: 2.2rem;
            font-weight: 600;
            color: #d0dcff;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(147, 112, 219, 0.1);
            color: #a0b0d0;
            font-size: 0.9rem;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-item span:last-child {
            color: #b8c7ff;
            font-weight: 500;
        }

        /* Цілі */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #d0dcff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h2 i {
            color: #9370db;
            font-size: 1.3rem;
        }

        .btn-create {
            background: rgba(75, 90, 130, 0.3);
            color: #b8c7ff;
            border: 1px solid rgba(147, 112, 219, 0.3);
        }

        .btn-create:hover {
            background: rgba(95, 115, 170, 0.4);
            border-color: rgba(147, 112, 219, 0.5);
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .goal-card {
            background: rgba(22, 26, 36, 0.7);
            border-radius: 24px;
            padding: 22px;
            border: 1px solid rgba(147, 112, 219, 0.15);
            backdrop-filter: blur(5px);
            position: relative;
            transition: all 0.2s ease;
        }

        .goal-card:hover {
            background: rgba(28, 32, 45, 0.8);
            border-color: rgba(147, 112, 219, 0.3);
        }

        .goal-delete {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: rgba(50, 35, 45, 0.5);
            color: #ffa0b0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(219, 112, 147, 0.2);
            transition: all 0.2s ease;
        }

        .goal-delete:hover {
            background: rgba(80, 45, 60, 0.7);
            color: #ffb8d0;
            border-color: rgba(219, 112, 147, 0.4);
        }

        .goal-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #d0dcff;
            margin-bottom: 4px;
            padding-right: 32px;
        }

        .goal-currency {
            color: #9370db;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .goal-target {
            font-size: 1.5rem;
            font-weight: 600;
            color: #a8d0ff;
            margin: 12px 0;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            color: #90a0c0;
            font-size: 0.8rem;
            margin: 12px 0 6px;
        }

        .progress-bar {
            background: rgba(40, 45, 60, 0.5);
            height: 6px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #9370db, #7b68ee);
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        .goal-actions {
            display: flex;
            gap: 8px;
        }

        .input-group {
            flex: 2;
            display: flex;
            background: rgba(30, 35, 48, 0.5);
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid rgba(147, 112, 219, 0.2);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 14px;
            color: #e0ecff;
            font-size: 0.9rem;
        }

        .input-group input::placeholder {
            color: #6a7a9c;
        }

        .input-group button {
            background: rgba(75, 90, 130, 0.3);
            border: none;
            color: #b8c7ff;
            width: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .input-group button:hover {
            background: rgba(95, 115, 170, 0.4);
            color: #d0dcff;
        }

        .btn-withdraw {
            flex: 1;
            background: rgba(50, 40, 55, 0.4);
            border: 1px solid rgba(219, 112, 147, 0.2);
            color: #ffb0c0;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-withdraw:hover {
            background: rgba(80, 50, 70, 0.5);
            border-color: rgba(219, 112, 147, 0.4);
        }

        /* Борги */
        .debts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .debt-column {
            background: rgba(18, 22, 30, 0.7);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(147, 112, 219, 0.15);
        }

        .debt-column h3 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(147, 112, 219, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d0dcff;
        }

        .debt-column h3 i {
            color: #9370db;
        }

        .debt-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 18px;
        }

        .debt-list::-webkit-scrollbar {
            width: 4px;
        }

        .debt-list::-webkit-scrollbar-track {
            background: rgba(40, 45, 60, 0.3);
            border-radius: 4px;
        }

        .debt-list::-webkit-scrollbar-thumb {
            background: rgba(147, 112, 219, 0.3);
            border-radius: 4px;
        }

        .debt-item {
            background: rgba(28, 32, 42, 0.5);
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(147, 112, 219, 0.1);
            transition: all 0.2s ease;
        }

        .debt-item:hover {
            background: rgba(36, 42, 55, 0.7);
            border-color: rgba(147, 112, 219, 0.25);
        }

        .debt-name {
            font-weight: 500;
            color: #d0dcff;
            margin-bottom: 3px;
        }

        .debt-desc {
            font-size: 0.75rem;
            color: #8090b0;
        }

        .debt-amount {
            font-weight: 600;
            padding: 5px 14px;
            background: rgba(45, 55, 75, 0.4);
            border-radius: 30px;
            color: #b8c7ff;
            font-size: 0.9rem;
            border: 1px solid rgba(147, 112, 219, 0.2);
        }

        .debt-amount.owe {
            color: #ffb8d0;
            border-color: rgba(219, 112, 147, 0.2);
        }

        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input, select {
            background: rgba(28, 32, 45, 0.7);
            border: 1px solid rgba(147, 112, 219, 0.15);
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            flex: 1;
            color: #e0ecff;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(147, 112, 219, 0.5);
            background: rgba(32, 38, 55, 0.8);
        }

        .btn-add {
            background: rgba(75, 90, 130, 0.3);
            color: #b8c7ff;
            border: 1px solid rgba(147, 112, 219, 0.3);
            padding: 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            background: rgba(95, 115, 170, 0.4);
            border-color: rgba(147, 112, 219, 0.5);
        }

        .footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(147, 112, 219, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8090b0;
            font-size: 0.9rem;
        }

        .btn-clear {
            background: rgba(60, 45, 55, 0.4);
            border: 1px solid rgba(219, 112, 147, 0.2);
            color: #ffb0c0;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            background: rgba(90, 55, 75, 0.5);
            border-color: rgba(219, 112, 147, 0.4);
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(22, 26, 36, 0.95);
            border-radius: 36px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(147, 112, 219, 0.3);
        }

        .modal-content h2 {
            color: #d0dcff;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .modal-input, .modal-select {
            width: 100%;
            background: rgba(28, 32, 48, 0.8);
            border: 1px solid rgba(147, 112, 219, 0.2);
            padding: 14px 18px;
            border-radius: 40px;
            color: #e0ecff;
            margin-bottom: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn.create {
            background: rgba(75, 90, 130, 0.5);
            color: #b8c7ff;
            border: 1px solid rgba(147, 112, 219, 0.4);
        }

        .modal-btn.create:hover {
            background: rgba(95, 115, 170, 0.6);
            border-color: rgba(147, 112, 219, 0.6);
        }

        .modal-btn.cancel {
            background: rgba(50, 40, 55, 0.5);
            color: #ffb0c0;
            border: 1px solid rgba(219, 112, 147, 0.3);
        }

        .modal-btn.cancel:hover {
            background: rgba(80, 50, 70, 0.6);
            border-color: rgba(219, 112, 147, 0.5);
        }

        /* ========== МОБІЛЬНІ СТИЛІ ========== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .glass-card {
                padding: 20px;
                border-radius: 28px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .logo {
                justify-content: center;
                flex-wrap: wrap;
            }

            .logo-text {
                font-size: 1.6rem;
            }

            .logo-badge {
                font-size: 0.7rem;
                padding: 4px 12px;
                margin-left: 0;
            }

            .auth-section {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .btn {
                width: 100%;
                justify-content: center;
                padding: 12px 16px;
            }

            .user-email {
                width: 100%;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .stat-card {
                padding: 18px;
            }

            .stat-total {
                font-size: 1.8rem;
            }

            .section-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .section-header h2 {
                font-size: 1.2rem;
                justify-content: center;
            }

            .btn-create {
                width: 100%;
            }

            .goals-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .goal-card {
                padding: 18px;
            }

            .goal-name {
                font-size: 1.2rem;
            }

            .goal-target {
                font-size: 1.3rem;
            }

            .goal-actions {
                flex-direction: column;
                gap: 6px;
            }

            .btn-withdraw {
                padding: 10px;
            }

            .debts-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .debt-column {
                padding: 18px;
            }

            .debt-column h3 {
                font-size: 1.2rem;
            }

            .form-row {
                flex-direction: column;
                gap: 6px;
            }

            .footer {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
                text-align: center;
            }

            .btn-clear {
                width: 100%;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-content h2 {
                font-size: 1.3rem;
            }

            .modal-input, .modal-select {
                padding: 12px 16px;
            }

            .modal-btn {
                padding: 12px;
            }
        }

        @media (max-width: 380px) {
            .logo-text {
                font-size: 1.4rem;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
            }

            .logo-icon i {
                font-size: 20px;
            }

            .stat-total {
                font-size: 1.5rem;
            }

            .goal-target {
                font-size: 1.2rem;
            }
        }

        /* Анімації */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- Індикатор оновлення -->
    <div class="refresh-indicator" id="refreshIndicator">
        <i class="fas fa-sync-alt"></i>
        <span>Оновлення...</span>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <span class="logo-text">BORGY</span>
                    <span class="logo-badge">
                        <i class="fas fa-robot"></i> фінансовий радник
                    </span>
                </div>
                <div class="auth-section" id="authSection">
                    <div id="userInfo" style="display: none;">
                        <span class="user-email">
                            <i class="fas fa-user-astronaut"></i>
                            <span id="userEmail"></span>
                        </span>
                        <button class="btn btn-logout" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i> ВИЙТИ
                        </button>
                    </div>
                    <button class="btn btn-google" id="loginBtn">
                        <i class="fab fa-google"></i>
                        УВІЙТИ ЧЕРЕЗ GOOGLE
                    </button>
                </div>
            </div>

            <!-- Контент -->
            <div id="mainContent" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-arrow-down"></i> МЕНІ ВИНЕНІ
                        </div>
                        <div class="stat-total" id="totalOwed">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="owedUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="owedEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="owedUSD">0 $</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-arrow-up"></i> Я ВИНЕН
                        </div>
                        <div class="stat-total" id="totalOwe">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="oweUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="oweEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="oweUSD">0 $</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">
                            <i class="fas fa-balance-scale"></i> ЧИСТИЙ РЕЗУЛЬТАТ
                        </div>
                        <div class="stat-total" id="totalNet">0 ₴</div>
                        <div class="stat-item"><span><i class="fas fa-hryvnia"></i> Гривня:</span><span id="netUAH">0 ₴</span></div>
                        <div class="stat-item"><span><i class="fas fa-euro-sign"></i> Євро:</span><span id="netEUR">0 €</span></div>
                        <div class="stat-item"><span><i class="fas fa-dollar-sign"></i> Долар:</span><span id="netUSD">0 $</span></div>
                    </div>
                </div>

                <div class="goals-section">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-crown"></i>
                            МОЇ ЦІЛІ
                        </h2>
                        <button class="btn btn-create" id="createGoalBtn">
                            <i class="fas fa-plus"></i> НОВА ЦІЛЬ
                        </button>
                    </div>
                    <div class="goals-grid" id="goalsContainer"></div>
                </div>

                <div class="debts-grid">
                    <div class="debt-column">
                        <h3>
                            <i class="fas fa-inbox"></i>
                            МЕНІ ВИНЕНІ
                        </h3>
                        <ul class="debt-list" id="owedList"></ul>
                        <div class="form-row">
                            <input type="text" id="owedName" placeholder="Ім'я">
                            <input type="number" id="owedAmount" placeholder="Сума" step="0.01">
                        </div>
                        <div class="form-row">
                            <select id="owedCurrency">
                                <option value="UAH">🇺🇦 UAH</option>
                                <option value="EUR">🇪🇺 EUR</option>
                                <option value="USD">🇺🇸 USD</option>
                            </select>
                            <input type="text" id="owedDesc" placeholder="Опис">
                        </div>
                        <button class="btn-add" id="addOwedBtn">
                            <i class="fas fa-plus-circle"></i> ДОДАТИ
                        </button>
                    </div>
                    <div class="debt-column">
                        <h3>
                            <i class="fas fa-paper-plane"></i>
                            Я ВИНЕН
                        </h3>
                        <ul class="debt-list" id="oweList"></ul>
                        <div class="form-row">
                            <input type="text" id="oweName" placeholder="Кому">
                            <input type="number" id="oweAmount" placeholder="Сума" step="0.01">
                        </div>
                        <div class="form-row">
                            <select id="oweCurrency">
                                <option value="UAH">🇺🇦 UAH</option>
                                <option value="EUR">🇪🇺 EUR</option>
                                <option value="USD">🇺🇸 USD</option>
                            </select>
                            <input type="text" id="oweDesc" placeholder="Опис">
                        </div>
                        <button class="btn-add" id="addOweBtn">
                            <i class="fas fa-plus-circle"></i> ДОДАТИ
                        </button>
                    </div>
                </div>
            </div>

            <!-- Футер -->
            <div class="footer" id="footer" style="display: none;">
                <span>
                    <i class="fas fa-shield-alt"></i> Дані синхронізуються через Firebase
                </span>
                <button class="btn-clear" id="clearAllBtn">
                    <i class="fas fa-broom"></i> ОЧИСТИТИ ВСЕ
                </button>
            </div>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <h2>🎯 СТВОРИТИ ЦІЛЬ</h2>
            <input type="text" class="modal-input" id="goalName" placeholder="Назва (наприклад, ТЕЛЕФОН)">
            <select class="modal-select" id="goalCurrency">
                <option value="UAH">🇺🇦 ГРИВНЯ (UAH)</option>
                <option value="EUR">🇪🇺 ЄВРО (EUR)</option>
                <option value="USD">🇺🇸 ДОЛАР (USD)</option>
            </select>
            <input type="number" class="modal-input" id="goalTarget" placeholder="Цільова сума" min="1" step="1">
            <div class="modal-buttons">
                <button class="modal-btn create" id="saveGoalBtn">
                    <i class="fas fa-check"></i> СТВОРИТИ
                </button>
                <button class="modal-btn cancel" id="cancelGoalBtn">
                    <i class="fas fa-times"></i> СКАСУВАТИ
                </button>
            </div>
        </div>
    </div>

    <script>
        // ТВІЙ КОНФІГ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD6hldl2mZS1xZe1Z8ZERWM19kpCjAqfwQ",
            authDomain: "borgi-60d8d.firebaseapp.com",
            databaseURL: "https://borgi-60d8d-default-rtdb.firebaseio.com",
            projectId: "borgi-60d8d",
            storageBucket: "borgi-60d8d.firebasestorage.app",
            messagingSenderId: "361694792367",
            appId: "1:361694792367:web:ccbfc861668a568e1e225a",
            measurementId: "G-24DJQ1KSG8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let state = { goals: [], debts: { owed: [], owe: [] } };
        let currentUser = null;

        // Елементи DOM
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userEmail = document.getElementById('userEmail');
        const mainContent = document.getElementById('mainContent');
        const footer = document.getElementById('footer');
        const refreshIndicator = document.getElementById('refreshIndicator');

        // Змінні для pull-to-refresh
        let touchStartY = 0;
        let isRefreshing = false;

        // Обробник дотиків для оновлення
        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0 && !isRefreshing) {
                touchStartY = e.touches[0].clientY;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (window.scrollY === 0 && !isRefreshing && touchStartY > 0) {
                const currentY = e.touches[0].clientY;
                const pullDistance = currentY - touchStartY;
                
                if (pullDistance > 20 && pullDistance < 100) {
                    refreshIndicator.classList.add('active');
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            if (window.scrollY === 0 && !isRefreshing && touchStartY > 0) {
                const touchEndY = e.changedTouches[0].clientY;
                const pullDistance = touchEndY - touchStartY;
                
                if (pullDistance > 50) {
                    isRefreshing = true;
                    
                    // Оновлюємо сторінку
                    setTimeout(() => {
                        window.location.reload();
                    }, 300);
                } else {
                    // Ховаємо індикатор
                    refreshIndicator.classList.remove('active');
                }
            }
            
            touchStartY = 0;
        });

        function getSymbol(currency) {
            if (currency === 'UAH') return '₴';
            if (currency === 'EUR') return '€';
            if (currency === 'USD') return '$';
            return '?';
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 9); }

        function updateStats() {
            let owedUAH=0, owedEUR=0, owedUSD=0, oweUAH=0, oweEUR=0, oweUSD=0;
            
            (state.debts.owed || []).forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') owedUAH+=a; else if(i.currency==='EUR') owedEUR+=a; else if(i.currency==='USD') owedUSD+=a; });
            (state.debts.owe || []).forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') oweUAH+=a; else if(i.currency==='EUR') oweEUR+=a; else if(i.currency==='USD') oweUSD+=a; });

            document.getElementById('owedUAH').innerHTML = owedUAH.toFixed(2)+' ₴';
            document.getElementById('owedEUR').innerHTML = owedEUR.toFixed(2)+' €';
            document.getElementById('owedUSD').innerHTML = owedUSD.toFixed(2)+' $';
            document.getElementById('totalOwed').innerHTML = (owedUAH+owedEUR+owedUSD).toFixed(2)+' ₴';

            document.getElementById('oweUAH').innerHTML = oweUAH.toFixed(2)+' ₴';
            document.getElementById('oweEUR').innerHTML = oweEUR.toFixed(2)+' €';
            document.getElementById('oweUSD').innerHTML = oweUSD.toFixed(2)+' $';
            document.getElementById('totalOwe').innerHTML = (oweUAH+oweEUR+oweUSD).toFixed(2)+' ₴';

            const nUAH=owedUAH-oweUAH, nEUR=owedEUR-oweEUR, nUSD=owedUSD-oweUSD;
            const total=(owedUAH+owedEUR+owedUSD)-(oweUAH+oweEUR+oweUSD);

            document.getElementById('netUAH').innerHTML = (nUAH>=0?'+':'')+nUAH.toFixed(2)+' ₴';
            document.getElementById('netEUR').innerHTML = (nEUR>=0?'+':'')+nEUR.toFixed(2)+' €';
            document.getElementById('netUSD').innerHTML = (nUSD>=0?'+':'')+nUSD.toFixed(2)+' $';
            document.getElementById('totalNet').innerHTML = (total>=0?'+':'')+total.toFixed(2)+' ₴';
        }

        function renderGoals() {
            const container = document.getElementById('goalsContainer');
            if (!state.goals?.length) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;background:rgba(22,26,36,0.7);border-radius:24px;color:#8090b0;border:1px solid rgba(147,112,219,0.2);">➕ Створіть свою першу ціль</div>';
                return;
            }
            let html = '';
            state.goals.forEach(g => {
                const s = getSymbol(g.currency), p = g.target>0 ? (g.saved/g.target)*100 : 0, r = Math.max(0, g.target-g.saved);
                html += `<div class="goal-card"><div class="goal-delete" onclick="deleteGoal('${g.id}')"><i class="fas fa-times"></i></div><div class="goal-name">${esc(g.name)}</div><div class="goal-currency">${g.currency}</div><div class="goal-target">${g.target.toFixed(0)} ${s}</div><div class="progress-stats"><span><i class="fas fa-piggy-bank"></i> ${g.saved.toFixed(2)} ${s}</span><span><i class="fas fa-clock"></i> ${r.toFixed(2)} ${s}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(p,100)}%"></div></div><div class="goal-actions"><div class="input-group"><input type="number" id="add-${g.id}" placeholder="Сума"><button onclick="addToGoal('${g.id}')"><i class="fas fa-plus"></i></button></div><button class="btn-withdraw" onclick="withdrawFromGoal('${g.id}')"><i class="fas fa-hand-holding-usd"></i> ЗНЯТИ</button></div></div>`;
            });
            container.innerHTML = html;
        }

        function renderDebts() {
            const owedList = document.getElementById('owedList');
            owedList.innerHTML = (!state.debts.owed?.length) ? '<li style="text-align:center;padding:20px;color:#8090b0;">Поки ніхто не винен</li>' : 
                state.debts.owed.map(i => `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount">${Number(i.amount).toFixed(2)} ${getSymbol(i.currency)}</div></li>`).join('');

            document.querySelectorAll('#owedList .debt-item').forEach(el => el.addEventListener('click', function() {
                if(confirm('Видалити?')) { state.debts.owed = state.debts.owed.filter(d => d.id !== this.dataset.id); saveToFirebase(); }}));

            const oweList = document.getElementById('oweList');
            oweList.innerHTML = (!state.debts.owe?.length) ? '<li style="text-align:center;padding:20px;color:#8090b0;">Поки нікому не винен</li>' : 
                state.debts.owe.map(i => `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount owe">${Number(i.amount).toFixed(2)} ${getSymbol(i.currency)}</div></li>`).join('');

            document.querySelectorAll('#oweList .debt-item').forEach(el => el.addEventListener('click', function() {
                if(confirm('Видалити?')) { state.debts.owe = state.debts.owe.filter(d => d.id !== this.dataset.id); saveToFirebase(); }}));
        }

        function saveToFirebase() {
            if (!currentUser) return;
            database.ref('users/' + currentUser.uid).set({
                goals: state.goals || [],
                debts: { owed: state.debts.owed || [], owe: state.debts.owe || [] }
            });
        }

        function loadFromFirebase(uid) {
            database.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    state.goals = data.goals || [];
                    state.debts = { owed: data.debts?.owed || [], owe: data.debts?.owe || [] };
                }
                renderGoals(); renderDebts(); updateStats();
            });
        }

        window.addToGoal = function(id) {
            let i = document.getElementById('add-'+id), a = parseFloat(i.value);
            if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g) { g.saved += a; saveToFirebase(); } }
            i.value = '';
        };

        window.withdrawFromGoal = function(id) {
            let a = parseFloat(prompt('Скільки зняти?','0'));
            if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g && a<=g.saved) { g.saved -= a; saveToFirebase(); } else alert('Недостатньо'); }
        };

        window.deleteGoal = function(id) {
            if (confirm('Видалити ціль?')) { state.goals = state.goals.filter(g=>g.id!==id); saveToFirebase(); }
        };

        document.getElementById('addOwedBtn').addEventListener('click', () => {
            let n=document.getElementById('owedName').value.trim(), a=parseFloat(document.getElementById('owedAmount').value), c=document.getElementById('owedCurrency').value, d=document.getElementById('owedDesc').value.trim();
            if(!n||isNaN(a)||a<=0) { alert('Заповніть поля'); return; }
            if(!state.debts.owed) state.debts.owed = [];
            state.debts.owed.push({id:genId(), name:n, amount:a, currency:c, description:d});
            saveToFirebase();
            document.getElementById('owedName').value = document.getElementById('owedAmount').value = document.getElementById('owedDesc').value = '';
        });

        document.getElementById('addOweBtn').addEventListener('click', () => {
            let n=document.getElementById('oweName').value.trim(), a=parseFloat(document.getElementById('oweAmount').value), c=document.getElementById('oweCurrency').value, d=document.getElementById('oweDesc').value.trim();
            if(!n||isNaN(a)||a<=0) { alert('Заповніть поля'); return; }
            if(!state.debts.owe) state.debts.owe = [];
            state.debts.owe.push({id:genId(), name:n, amount:a, currency:c, description:d});
            saveToFirebase();
            document.getElementById('oweName').value = document.getElementById('oweAmount').value = document.getElementById('oweDesc').value = '';
        });

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('Видалити ВСІ дані?')) {
                state = { goals: [], debts: { owed: [], owe: [] } };
                saveToFirebase();
            }
        });

        // Модалка
        const modal = document.getElementById('goalModal');
        document.getElementById('createGoalBtn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('cancelGoalBtn').addEventListener('click', () => {
            modal.classList.remove('active');
            document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
        });
        document.getElementById('saveGoalBtn').addEventListener('click', () => {
            let n = document.getElementById('goalName').value.trim().toUpperCase();
            let c = document.getElementById('goalCurrency').value;
            let t = parseFloat(document.getElementById('goalTarget').value);
            if (!n || isNaN(t) || t<=0) { alert('Введіть назву та суму'); return; }
            if(!state.goals) state.goals = [];
            state.goals.push({id:genId(), name:n, currency:c, target:t, saved:0});
            saveToFirebase();
            document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
            modal.classList.remove('active');
        });
        modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('active'); });

        // Аутентифікація
        loginBtn.addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message)));
        logoutBtn.addEventListener('click', () => auth.signOut());

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                userEmail.textContent = user.email;
                userInfo.style.display = 'flex';
                loginBtn.style.display = 'none';
                mainContent.style.display = 'block';
                footer.style.display = 'flex';
                loadFromFirebase(user.uid);
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                loginBtn.style.display = 'flex';
                mainContent.style.display = 'none';
                footer.style.display = 'none';
                state = { goals: [], debts: { owed: [], owe: [] } };
            }
        });
    </script>
</body>
</html>
